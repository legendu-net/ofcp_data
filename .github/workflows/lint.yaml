name: Lint Code

on:
  pull_request:
    branches:
      - main

jobs:
  lint_code:
    runs-on: ubuntu-latest
    container:
      image: dclong/rust-cicd
    steps:
    - uses: actions/checkout@v6
    #- uses: Swatinem/rust-cache@v2
    - name: Check Code Formatting
      run: |
        cargo fmt --all -- --check
    #- name: Lint Code Using Clippy
      #run: |
      #cargo clippy
